<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ BOCACHU vs GODZILLA RIVER - La Batalla Final</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-wrapper {
            background: linear-gradient(145deg, #1a2a5a, #0d1a3a);
            border-radius: 20px;
            padding: 2rem;
            border: 3px solid #f5c842;
            box-shadow: 0 0 60px rgba(245, 200, 66, 0.2);
            max-width: 900px;
            width: 100%;
            margin: 20px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0 0.5rem;
        }

        .game-title {
            font-size: 1.8rem;
            color: #f5c842;
            text-shadow: 0 0 20px rgba(245, 200, 66, 0.3);
        }

        .game-title span {
            color: #1a3a8a;
        }

        .controls-hint {
            font-size: 0.8rem;
            opacity: 0.7;
            text-align: right;
        }

        .controls-hint kbd {
            background: rgba(245, 200, 66, 0.2);
            padding: 0.2rem 0.6rem;
            border-radius: 5px;
            border: 1px solid #f5c842;
            font-size: 0.8rem;
            color: #f5c842;
        }

        /* Canvas del juego */
        #gameCanvas {
            background: linear-gradient(180deg, #0a1a3a 0%, #1a4a2a 50%, #0d2a1a 100%);
            border-radius: 15px;
            border: 2px solid #f5c842;
            display: block;
            width: 100%;
            height: auto;
            cursor: none;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.5);
        }

        /* Barras de energía */
        .health-bars {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin: 1rem 0;
            padding: 0.5rem;
        }

        .health-bar-container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .health-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            font-weight: bold;
        }

        .health-bar-label .name-boca {
            color: #f5c842;
        }

        .health-bar-label .name-river {
            color: #ff4444;
        }

        .health-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .health-bar .fill {
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 10px;
            position: relative;
        }

        .health-bar .fill.boca {
            background: linear-gradient(90deg, #f5c842, #ffd700);
            box-shadow: 0 0 20px rgba(245, 200, 66, 0.3);
        }

        .health-bar .fill.river {
            background: linear-gradient(90deg, #cc0000, #ff4444);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        .health-bar .fill.shake {
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .health-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.8rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        /* Botones de control móvil */
        .mobile-controls {
            display: none;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: grid;
            }
        }

        .mobile-btn {
            background: rgba(245, 200, 66, 0.2);
            border: 1px solid #f5c842;
            border-radius: 10px;
            padding: 0.8rem;
            color: #f5c842;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .mobile-btn:active {
            transform: scale(0.9);
            background: rgba(245, 200, 66, 0.4);
        }

        .mobile-btn.direction {
            font-size: 1.8rem;
        }

        .mobile-btn.attack {
            background: rgba(255, 0, 0, 0.2);
            border-color: #ff4444;
            color: #ff4444;
        }

        .mobile-btn.attack:active {
            background: rgba(255, 0, 0, 0.4);
        }

        .mobile-btn.special {
            background: rgba(0, 100, 255, 0.2);
            border-color: #4488ff;
            color: #4488ff;
        }

        .mobile-btn.special:active {
            background: rgba(0, 100, 255, 0.4);
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.3rem;
        }

        .controls-grid .mobile-btn {
            padding: 0.5rem;
            font-size: 1rem;
        }

        .game-footer {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        .game-footer .keys {
            color: #f5c842;
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 15px;
            z-index: 10;
        }

        .game-over-overlay.show {
            display: flex;
        }

        .game-over-overlay h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .game-over-overlay .sub {
            font-size: 1.5rem;
            opacity: 0.8;
            margin-bottom: 2rem;
        }

        .game-over-overlay .btn-restart {
            background: #f5c842;
            color: #1a1a1a;
            border: none;
            padding: 1rem 3rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .game-over-overlay .btn-restart:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(245, 200, 66, 0.5);
        }

        .canvas-wrapper {
            position: relative;
        }

        /* Efecto de daño */
        .damage-flash {
            animation: flashDamage 0.2s ease;
        }

        @keyframes flashDamage {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Mensajes de combate */
        .battle-message {
            text-align: center;
            font-size: 1rem;
            min-height: 30px;
            padding: 0.5rem;
            margin-top: 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(245, 200, 66, 0.2);
            color: #f5c842;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="game-header">
        <div class="game-title">⚡ <span>BOCACHU</span> vs <span style="color: #ff4444;">GODZILLA RIVER</span></div>
        <div class="controls-hint">
            <kbd>←↑↓→</kbd> Mover &nbsp;|&nbsp; <kbd>K</kbd> Patada 🔥 &nbsp;|&nbsp; <kbd>O</kbd> Kamehameha 🌊
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div class="game-over-overlay" id="gameOverOverlay">
            <h1 id="resultTitle">🏆 ¡BOCA CAMPEÓN!</h1>
            <div class="sub" id="resultSub">💙💛 La Bombonera explota de alegría</div>
            <button class="btn-restart" onclick="restartGame()">🔄 REVANCHA</button>
        </div>
    </div>

    <div class="health-bars">
        <div class="health-bar-container">
            <div class="health-bar-label">
                <span class="name-boca">⚡ BOCACHU</span>
                <span id="bocaHealthText">100%</span>
            </div>
            <div class="health-bar">
                <div class="fill boca" id="bocaHealthFill" style="width: 100%">
                    <span class="health-text" id="bocaHealthNum">100</span>
                </div>
            </div>
        </div>
        <div class="health-bar-container">
            <div class="health-bar-label">
                <span class="name-river">🐉 GODZILLA RIVER</span>
                <span id="riverHealthText">100%</span>
            </div>
            <div class="health-bar">
                <div class="fill river" id="riverHealthFill" style="width: 100%">
                    <span class="health-text" id="riverHealthNum">100</span>
                </div>
            </div>
        </div>
    </div>

    <div class="battle-message" id="battleMessage">⚔️ ¡Que comience la batalla! 💙💛</div>

    <!-- Controles móviles -->
    <div class="mobile-controls">
        <div></div>
        <div class="mobile-btn direction" onclick="movePokemon('up')">⬆</div>
        <div></div>
        <div class="mobile-btn direction" onclick="movePokemon('left')">⬅</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem;">
            <div class="mobile-btn attack" onclick="attackFire()">🔥 K</div>
            <div class="mobile-btn special" onclick="attackKame()">🌊 O</div>
        </div>
        <div class="mobile-btn direction" onclick="movePokemon('right')">➡</div>
        <div></div>
        <div class="mobile-btn direction" onclick="movePokemon('down')">⬇</div>
        <div></div>
    </div>

    <div class="game-footer">
        💙💛 <span class="keys">DALE BOCA</span> 💙💛 &nbsp;|&nbsp; Presioná <span class="keys">ESPACIO</span> para reiniciar
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 800, H = 500;

    // Estado del juego
    let gameRunning = true;
    let gameOver = false;
    let winner = '';

    // Jugadores
    const boca = {
        x: 150, y: 250,
        width: 50, height: 60,
        hp: 100, maxHp: 100,
        attackCooldown: 0,
        kameCooldown: 0,
        invincible: 0,
        facing: 1 // 1 = derecha, -1 = izquierda
    };

    const river = {
        x: 600, y: 250,
        width: 70, height: 80,
        hp: 100, maxHp: 100,
        attackCooldown: 0,
        invincible: 0,
        facing: -1,
        state: 'idle', // idle, attacking, special
        attackTimer: 0,
        specialTimer: 0
    };

    // Proyectiles
    const projectiles = [];

    // Teclas presionadas
    const keys = {
        left: false, right: false, up: false, down: false,
        k: false, o: false
    };

    // Mensaje de batalla
    let battleMessage = '⚔️ ¡Que comience la batalla! 💙💛';
    let messageTimer = 0;

    function setMessage(msg) {
        battleMessage = msg;
        messageTimer = 60;
        document.getElementById('battleMessage').textContent = msg;
    }

    // Dibujar BOCACHU
    function drawBocachu(x, y, facing) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(facing, 1);
        
        // Sombra
        ctx.shadowColor = 'rgba(245, 200, 66, 0.3)';
        ctx.shadowBlur = 20;
        
        // Cuerpo
        ctx.fillStyle = '#f5c842';
        ctx.beginPath();
        ctx.ellipse(0, 0, 22, 28, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Sombras
        ctx.shadowBlur = 0;
        
        // Orejas
        ctx.fillStyle = '#f5c842';
        ctx.beginPath();
        ctx.moveTo(-18, -22);
        ctx.lineTo(-13, -38);
        ctx.lineTo(-7, -18);
        ctx.fill();
        
        ctx.beginPath();
        ctx.moveTo(18, -22);
        ctx.lineTo(13, -38);
        ctx.lineTo(7, -18);
        ctx.fill();
        
        // Punta de orejas (negras)
        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath();
        ctx.moveTo(-16, -35);
        ctx.lineTo(-13, -38);
        ctx.lineTo(-11, -34);
        ctx.fill();
        
        ctx.beginPath();
        ctx.moveTo(16, -35);
        ctx.lineTo(13, -38);
        ctx.lineTo(11, -34);
        ctx.fill();
        
        // Rayo en la frente
        ctx.fillStyle = '#1a3a8a';
        ctx.beginPath();
        ctx.moveTo(0, -28);
        ctx.lineTo(-4, -20);
        ctx.lineTo(0, -20);
        ctx.lineTo(-2, -14);
        ctx.lineTo(3, -20);
        ctx.lineTo(0, -20);
        ctx.fill();
        
        // Ojos
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.ellipse(-9, -4, 6, 7, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(9, -4, 6, 7, 0, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath();
        ctx.arc(-9, -3, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(9, -3, 3, 0, Math.PI * 2);
        ctx.fill();
        
        // Mejillas azules
        ctx.fillStyle = 'rgba(26, 58, 138, 0.4)';
        ctx.beginPath();
        ctx.ellipse(-16, 5, 8, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(16, 5, 8, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Boca
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 8, 10, 0.1, Math.PI - 0.1);
        ctx.stroke();
        
        // Número 6
        ctx.fillStyle = '#1a3a8a';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('6', 0, 8);
        
        // Brazos
        ctx.fillStyle = '#f5c842';
        ctx.save();
        ctx.translate(-26, 0);
        ctx.rotate(-0.4);
        ctx.fillRect(-4, 0, 8, 18);
        ctx.restore();
        
        ctx.save();
        ctx.translate(26, 0);
        ctx.rotate(0.4);
        ctx.fillRect(-4, 0, 8, 18);
        ctx.restore();
        
        // Piernas
        ctx.fillStyle = '#f5c842';
        ctx.fillRect(-12, 22, 10, 14);
        ctx.fillRect(2, 22, 10, 14);
        
        // Zapatos azules
        ctx.fillStyle = '#1a3a8a';
        ctx.fillRect(-14, 32, 14, 6);
        ctx.fillRect(0, 32, 14, 6);
        
        // Cola
        ctx.strokeStyle = '#f5c842';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, 24);
        ctx.quadraticCurveTo(-20, 34, -24, 44);
        ctx.stroke();
        
        ctx.fillStyle = '#f5c842';
        ctx.beginPath();
        ctx.moveTo(-24, 44);
        ctx.lineTo(-28, 38);
        ctx.lineTo(-20, 40);
        ctx.fill();
        
        ctx.restore();
    }

    // Dibujar GODZILLA RIVER
    function drawGodzilla(x, y, facing, state) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(facing, 1);
        
        // Sombra roja
        ctx.shadowColor = 'rgba(255, 0, 0, 0.3)';
        ctx.shadowBlur = 20;
        
        // Cuerpo
        ctx.fillStyle = '#2a6a2a';
        ctx.beginPath();
        ctx.ellipse(0, 5, 30, 35, 0, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.shadowBlur = 0;
        
        // Escamas
        ctx.fillStyle = '#1a5a1a';
        for (let i = -20; i <= 20; i += 8) {
            ctx.beginPath();
            ctx.arc(i, -15, 4, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Cabeza
        ctx.fillStyle = '#2a7a2a';
        ctx.beginPath();
        ctx.ellipse(0, -28, 18, 16, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Hocico
        ctx.fillStyle = '#3a8a3a';
        ctx.beginPath();
        ctx.ellipse(0, -36, 14, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Ojos rojos
        ctx.fillStyle = '#ff0000';
        ctx.shadowColor = 'rgba(255, 0, 0, 0.5)';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(-8, -32, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(8, -32, 5, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath();
        ctx.arc(-8, -32, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(8, -32, 2, 0, Math.PI * 2);
        ctx.fill();
        
        // Dientes
        ctx.fillStyle = 'white';
        for (let i = -8; i <= 8; i += 4) {
            ctx.fillRect(i - 1, -40, 2, 4);
        }
        
        // Cuernos
        ctx.fillStyle = '#1a4a1a';
        ctx.beginPath();
        ctx.moveTo(-12, -38);
        ctx.lineTo(-18, -52);
        ctx.lineTo(-8, -44);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(12, -38);
        ctx.lineTo(18, -52);
        ctx.lineTo(8, -44);
        ctx.fill();
        
        // Brazos
        ctx.fillStyle = '#2a7a2a';
        ctx.save();
        ctx.translate(-30, 0);
        ctx.rotate(-0.8);
        ctx.fillRect(-3, 0, 8, 25);
        ctx.restore();
        
        ctx.save();
        ctx.translate(30, 0);
        ctx.rotate(0.8);
        ctx.fillRect(-5, 0, 8, 25);
        ctx.restore();
        
        // Piernas
        ctx.fillStyle = '#2a6a2a';
        ctx.fillRect(-16, 30, 12, 18);
        ctx.fillRect(4, 30, 12, 18);
        
        // Garras
        ctx.fillStyle = '#1a4a1a';
        for (let i = -20; i <= 20; i += 12) {
            ctx.beginPath();
            ctx.moveTo(i, 44);
            ctx.lineTo(i - 3, 52);
            ctx.lineTo(i, 48);
            ctx.lineTo(i + 3, 52);
            ctx.fill();
        }
        
        // Cola
        ctx.strokeStyle = '#2a6a2a';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(0, 30);
        ctx.quadraticCurveTo(20, 40, 28, 52);
        ctx.stroke();
        
        // Letra "R" en el pecho
        ctx.fillStyle = '#cc0000';
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('R', 0, 5);
        
        ctx.restore();
    }

    // Dibujar proyectil
    function drawProjectile(p) {
        ctx.save();
        ctx.shadowColor = p.type === 'fire' ? 'rgba(255, 100, 0, 0.5)' : 'rgba(0, 100, 255, 0.5)';
        ctx.shadowBlur = 30;
        
        if (p.type === 'fire') {
            // Patada de fuego
            const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 20);
            gradient.addColorStop(0, 'rgba(255, 200, 0, 1)');
            gradient.addColorStop(0.5, 'rgba(255, 100, 0, 0.8)');
            gradient.addColorStop(1, 'rgba(200, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 20, 0, Math.PI * 2);
            ctx.fill();
            
            // Fuego interior
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255, 255, 200, 0.8)';
            ctx.beginPath();
            ctx.arc(p.x - 3, p.y - 3, 8, 0, Math.PI * 2);
            ctx.fill();
            
        } else {
            // Kamehameha
            const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 35);
            gradient.addColorStop(0, 'rgba(100, 200, 255, 1)');
            gradient.addColorStop(0.3, 'rgba(50, 150, 255, 0.8)');
            gradient.addColorStop(1, 'rgba(0, 50, 200, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 35, 0, Math.PI * 2);
            ctx.fill();
            
            // Centro brillante
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.beginPath();
            ctx.arc(p.x - 5, p.y - 5, 10, 0, Math.PI * 2);
            ctx.fill();
            
            // Círculos concéntricos
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.3)';
            ctx.lineWidth = 2;
            for (let r = 10; r <= 30; r += 10) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
                ctx.stroke();
            }
        }
        
        ctx.restore();
    }

    // Actualizar juego
    function update() {
        if (gameOver || !gameRunning) return;
        
        // Movimiento de BOCACHU
        let dx = 0, dy = 0;
        if (keys.left) dx = -4;
        if (keys.right) dx = 4;
        if (keys.up) dy = -4;
        if (keys.down) dy = 4;
        
        if (dx !== 0 || dy !== 0) {
            boca.x += dx;
            boca.y += dy;
            if (dx !== 0) boca.facing = dx > 0 ? 1 : -1;
            
            // Límites
            boca.x = Math.max(30, Math.min(W - 30, boca.x));
            boca.y = Math.max(40, Math.min(H - 40, boca.y));
        }
        
        // Cooldowns
        if (boca.attackCooldown > 0) boca.attackCooldown--;
        if (boca.kameCooldown > 0) boca.kameCooldown--;
        if (boca.invincible > 0) boca.invincible--;
        
        if (river.attackCooldown > 0) river.attackCooldown--;
        if (river.invincible > 0) river.invincible--;
        
        // Ataques de BOCACHU
        if (keys.k && boca.attackCooldown === 0) {
            attackFire();
        }
        if (keys.o && boca.kameCooldown === 0) {
            attackKame();
        }
        
        // IA de RIVER - ataque automático
        if (river.attackCooldown === 0 && Math.random() < 0.03) {
            riverAttack();
        }
        
        // Mover proyectiles
        for (let i = projectiles.length - 1; i >= 0; i--) {
            const p = projectiles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
            
            // Colisión con jugadores
            if (p.owner === 'boca') {
                // Colisión con RIVER
                if (Math.abs(p.x - river.x) < 50 && Math.abs(p.y - river.y) < 50 && river.invincible === 0) {
                    const damage = p.type === 'fire' ? 15 : 25;
                    river.hp = Math.max(0, river.hp - damage);
                    river.invincible = 20;
                    projectiles.splice(i, 1);
                    setMessage(`💥 ¡GOLPE! ${damage} de daño a River!`);
                    updateHealthBars();
                    checkGameOver();
                    continue;
                }
            } else if (p.owner === 'river') {
                // Colisión con BOCA
                if (Math.abs(p.x - boca.x) < 40 && Math.abs(p.y - boca.y) < 40 && boca.invincible === 0) {
                    const damage = p.type === 'fire' ? 12 : 20;
                    boca.hp = Math.max(0, boca.hp - damage);
                    boca.invincible = 20;
                    projectiles.splice(i, 1);
                    setMessage(`💥 ¡River atacó! -${damage} HP`);
                    updateHealthBars();
                    checkGameOver();
                    continue;
                }
            }
            
            // Eliminar proyectil
            if (p.x < -50 || p.x > W + 50 || p.y < -50 || p.y > H + 50 || p.life <= 0) {
                projectiles.splice(i, 1);
            }
        }
        
        // Actualizar mensaje
        if (messageTimer > 0) messageTimer--;
    }

    function riverAttack() {
        if (river.attackCooldown > 0 || gameOver) return;
        river.attackCooldown = 30;
        
        const angle = Math.atan2(boca.y - river.y, boca.x - river.x);
        const speed = 4;
        
        projectiles.push({
            x: river.x + river.facing * 30,
            y: river.y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            type: 'fire',
            owner: 'river',
            life: 70
        });
        
        setMessage('🐉 ¡GODZILLA RIVER ataca!');
    }

    function checkGameOver() {
        if (boca.hp <= 0) {
            gameOver = true;
            winner = 'river';
            document.getElementById('resultTitle').textContent = '😈 ¡GODZILLA RIVER GANÓ!';
            document.getElementById('resultSub').textContent = '💔 La Bombonera está de luto... ¡REVANCHA!';
            document.getElementById('gameOverOverlay').classList.add('show');
            setMessage('💔 ¡River ganó! ¡No puede ser!');
        } else if (river.hp <= 0) {
            gameOver = true;
            winner = 'boca';
            document.getElementById('resultTitle').textContent = '🏆 ¡BOCA CAMPEÓN!';
            document.getElementById('resultSub').textContent = '💙💛 ¡La Bombonera explota de alegría! ¡DALE BOCA!';
            document.getElementById('gameOverOverlay').classList.add('show');
            setMessage('🏆 ¡BOCA GANÓ! ¡CAMPEONES! 💙💛');
        }
    }
