<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 La Bombonera Virtual - Boca Juniors</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: linear-gradient(180deg, #1a3a8a 0%, #0d1f4a 100%);
            padding: 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 4px solid #f5c842;
        }

        .header::before {
            content: '🏟️';
            position: absolute;
            font-size: 8rem;
            opacity: 0.1;
            top: -20px;
            right: -20px;
            transform: rotate(10deg);
        }

        .header h1 {
            font-size: 3.5rem;
            text-shadow: 0 0 30px rgba(245, 200, 66, 0.3);
            letter-spacing: 3px;
        }

        .header h1 span {
            color: #f5c842;
        }

        .header .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-top: 0.5rem;
            letter-spacing: 5px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Sección de la Bombonera con imágenes */
        .bombonera-section {
            background: linear-gradient(145deg, #1a2a5a, #0d1a3a);
            border-radius: 20px;
            padding: 2rem;
            border: 2px solid #f5c842;
            margin-bottom: 2rem;
            box-shadow: 0 10px 40px rgba(245, 200, 66, 0.1);
        }

        .bombonera-section h2 {
            color: #f5c842;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            text-align: center;
        }

        .image-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 768px) {
            .image-grid {
                grid-template-columns: 1fr;
            }
        }

        .image-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(245, 200, 66, 0.3);
            transition: transform 0.3s ease;
            position: relative;
        }

        .image-card:hover {
            transform: scale(1.03);
            border-color: #f5c842;
        }

        .image-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .image-card .caption {
            padding: 0.8rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            color: #f5c842;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Imagen de la Bombonera (usando SVG como placeholder) */
        .bombonera-stadium {
            background: linear-gradient(135deg, #1a3a2a, #0d2a1a);
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            border: 2px solid #f5c842;
            position: relative;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .bombonera-stadium .stadium-svg {
            width: 100%;
            max-width: 600px;
            height: auto;
        }

        /* POKEMON DE BOCA - BOCACHU */
        .pokemon-container {
            position: relative;
            display: inline-block;
            margin: 0 auto;
            cursor: pointer;
            animation: floatPokemon 3s ease-in-out infinite;
        }

        @keyframes floatPokemon {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .pokemon-container:hover {
            animation: floatPokemon 1s ease-in-out infinite;
        }

        .pokemon-svg {
            width: 150px;
            height: 150px;
            filter: drop-shadow(0 0 30px rgba(245, 200, 66, 0.3));
            transition: transform 0.3s ease;
        }

        .pokemon-container:hover .pokemon-svg {
            transform: scale(1.1) rotate(-5deg);
        }

        .pokemon-name {
            font-size: 1.5rem;
            color: #f5c842;
            margin-top: 0.5rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(245, 200, 66, 0.3);
        }

        .pokemon-type {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 0.3rem;
        }

        .type-badge {
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            background: #f5c842;
            color: #1a1a1a;
        }

        .type-badge.fighting {
            background: #1a3a8a;
            color: #f5c842;
        }

        /* Interactivo */
        .interactive-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        @media (max-width: 768px) {
            .interactive-section {
                grid-template-columns: 1fr;
            }
        }

        .stadium-card {
            background: linear-gradient(145deg, #1a2a5a, #0d1a3a);
            border-radius: 20px;
            padding: 2rem;
            border: 2px solid #f5c842;
            box-shadow: 0 10px 40px rgba(245, 200, 66, 0.1);
            transition: transform 0.3s ease;
        }

        .stadium-card:hover {
            transform: translateY(-5px);
        }

        .stadium-card h2 {
            color: #f5c842;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        .stadium-effect {
            background: radial-gradient(ellipse at center, #1a4a2a 0%, #0a1a0a 100%);
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .stadium-effect .field {
            width: 100%;
            height: 4px;
            background: #f5c842;
            margin: 10px 0;
            position: relative;
            animation: pulseField 2s ease-in-out infinite;
        }

        @keyframes pulseField {
            0%, 100% { opacity: 0.3; transform: scaleX(1); }
            50% { opacity: 1; transform: scaleX(1.1); }
        }

        .stadium-effect .goal {
            font-size: 3rem;
            animation: goalShine 1.5s ease-in-out infinite;
        }

        @keyframes goalShine {
            0%, 100% { transform: scale(1); text-shadow: 0 0 20px #f5c842; }
            50% { transform: scale(1.2); text-shadow: 0 0 60px #f5c842; }
        }

        .btn {
            background: linear-gradient(135deg, #f5c842, #d4a830);
            color: #1a1a1a;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0.5rem;
            box-shadow: 0 4px 15px rgba(245, 200, 66, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 30px rgba(245, 200, 66, 0.5);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #1a3a8a, #0d1f4a);
            color: #f5c842;
            border: 2px solid #f5c842;
        }

        .goal-counter {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: center;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }

        .goal-counter .number {
            font-size: 4rem;
            font-weight: bold;
            color: #f5c842;
            text-shadow: 0 0 30px rgba(245, 200, 66, 0.3);
            min-width: 100px;
            text-align: center;
        }

        .idols-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .idol-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(245, 200, 66, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .idol-card:hover {
            background: rgba(245, 200, 66, 0.1);
            transform: scale(1.05);
            border-color: #f5c842;
        }

        .idol-card .emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .idol-card .name {
            font-weight: bold;
            color: #f5c842;
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        .history-timeline {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .history-item:hover {
            background: rgba(245, 200, 66, 0.05);
            padding-left: 1rem;
        }

        .history-item .year {
            color: #f5c842;
            font-weight: bold;
        }

        .quote-section {
            text-align: center;
            margin: 3rem 0;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(245, 200, 66, 0.1), rgba(26, 58, 138, 0.1));
            border-radius: 20px;
            border: 1px solid rgba(245, 200, 66, 0.2);
        }

        .quote-section blockquote {
            font-size: 1.5rem;
            font-style: italic;
            color: #f5c842;
        }

        .quote-section footer {
            margin-top: 1rem;
            opacity: 0.7;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .stat-item {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 10px;
        }

        .stat-item .number {
            font-size: 2.5rem;
            color: #f5c842;
            font-weight: bold;
        }

        .stat-item .label {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 0.3rem;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .footer {
            text-align: center;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.5);
            margin-top: 3rem;
            border-top: 1px solid rgba(245, 200, 66, 0.1);
        }

        .footer .social {
            font-size: 2rem;
            margin: 1rem 0;
        }

        .footer .social span {
            margin: 0 0.5rem;
            cursor: pointer;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .footer .social span:hover {
            transform: scale(1.3) rotate(10deg);
        }

        .btn-masa {
            background: linear-gradient(135deg, #f5c842, #d4a830);
            color: #1a1a1a;
            border: none;
            padding: 1rem 3rem;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0.5rem;
            box-shadow: 0 4px 15px rgba(245, 200, 66, 0.3);
        }

        .btn-masa:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 30px rgba(245, 200, 66, 0.6);
        }

        /* Efecto de luz en la Bombonera */
        .stadium-light {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(ellipse at center, rgba(245, 200, 66, 0.05), transparent 70%);
            pointer-events: none;
            animation: lightPulse 3s ease-in-out infinite;
        }

        @keyframes lightPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🏆 <span>BOCA</span> JUNIORS</h1>
        <div class="subtitle">✦ LA BOMBONERA VIRTUAL ✦</div>
    </header>

    <div class="container">
        <!-- SECCIÓN DE LA BOMBONERA CON IMÁGENES Y POKEMON -->
        <div class="bombonera-section">
            <h2>🏟️ La Bombonera y la Hinchada</h2>
            
            <div class="image-grid">
                <!-- Imagen 1: Bombonera -->
                <div class="image-card">
                    <svg width="100%" height="250" viewBox="0 0 600 250" style="background: linear-gradient(135deg, #1a3a2a, #0d2a1a);">
                        <!-- Césped -->
                        <rect x="0" y="120" width="600" height="130" fill="#1a5a2a"/>
                        <rect x="0" y="120" width="600" height="130" fill="url(#grassPattern)" opacity="0.3"/>
                        
                        <!-- Patrones de césped -->
                        <pattern id="grassPattern" width="40" height="40" patternUnits="userSpaceOnUse">
                            <rect width="20" height="40" fill="#2a6a3a"/>
                            <rect x="20" width="20" height="40" fill="#1a5a2a"/>
                        </pattern>
                        
                        <!-- Cancha -->
                        <rect x="100" y="130" width="400" height="110" fill="#2a7a3a" stroke="#f5c842" stroke-width="2"/>
                        <circle cx="300" cy="185" r="25" fill="none" stroke="#f5c842" stroke-width="2"/>
                        <line x1="300" y1="130" x2="300" y2="240" stroke="#f5c842" stroke-width="2"/>
                        <rect x="140" y="140" width="60" height="90" fill="none" stroke="#f5c842" stroke-width="2"/>
                        <rect x="400" y="140" width="60" height="90" fill="none" stroke="#f5c842" stroke-width="2"/>
                        
                        <!-- Tribunas -->
                        <rect x="0" y="0" width="600" height="30" fill="#1a2a5a" stroke="#f5c842" stroke-width="1"/>
                        <rect x="0" y="30" width="600" height="90" fill="#2a3a6a" stroke="#f5c842" stroke-width="1" opacity="0.7"/>
                        
                        <!-- Techo -->
                        <path d="M 0 0 Q 300 -30 600 0" fill="none" stroke="#f5c842" stroke-width="3"/>
                        
                        <!-- Banderas -->
                        <rect x="50" y="30" width="20" height="90" fill="#f5c842"/>
                        <rect x="530" y="30" width="20" height="90" fill="#f5c842"/>
                        
                        <!-- Luces del estadio -->
                        <circle cx="100" cy="10" r="5" fill="#f5c842" opacity="0.8"/>
                        <circle cx="200" cy="5" r="5" fill="#f5c842" opacity="0.8"/>
                        <circle cx="300" cy="3" r="5" fill="#f5c842" opacity="0.8"/>
                        <circle cx="400" cy="5" r="5" fill="#f5c842" opacity="0.8"/>
                        <circle cx="500" cy="10" r="5" fill="#f5c842" opacity="0.8"/>
                        
                        <!-- Luces de estadio (rayos) -->
                        <line x1="100" y1="15" x2="150" y2="120" stroke="#f5c842" stroke-width="1" opacity="0.3"/>
                        <line x1="300" y1="10" x2="300" y2="120" stroke="#f5c842" stroke-width="1" opacity="0.3"/>
                        <line x1="500" y1="15" x2="450" y2="120" stroke="#f5c842" stroke-width="1" opacity="0.3"/>
                        
                        <!-- POKEMON BOCACHU en el centro -->
                        <g transform="translate(300, 175)" class="pokemon-container-svg">
                            <animateTransform attributeName="transform" type="translate" 
                                values="300,175; 300,165; 300,175" dur="2s" repeatCount="indefinite"/>
                            
                            <!-- Cuerpo de BOCACHU (amarillo) -->
                            <ellipse cx="0" cy="0" rx="25" ry="30" fill="#f5c842"/>
                            
                            <!-- Orejas con puntas negras -->
                            <polygon points="-20,-25 -15,-40 -8,-20" fill="#f5c842"/>
                            <polygon points="-17,-38 -15,-40 -12,-35" fill="#1a1a1a"/>
                            <polygon points="20,-25 15,-40 8,-20" fill="#f5c842"/>
                            <polygon points="17,-38 15,-40 12,-35" fill="#1a1a1a"/>
                            
                            <!-- Rayo en la frente (símbolo de Boca) -->
                            <polygon points="0,-30 -5,-22 0,-22 -3,-15 3,-22 0,-22" fill="#1a3a8a"/>
                            
                            <!-- Ojos -->
                            <ellipse cx="-10" cy="-5" rx="6" ry="7" fill="white"/>
                            <ellipse cx="10" cy="-5" rx="6" ry="7" fill="white"/>
                            <ellipse cx="-10" cy="-4" rx="3" ry="4" fill="#1a1a1a"/>
                            <ellipse cx="10" cy="-4" rx="3" ry="4" fill="#1a1a1a"/>
                            
                            <!-- Mejillas azules (como Boca) -->
                            <ellipse cx="-18" cy="5" rx="8" ry="5" fill="#1a3a8a" opacity="0.5"/>
                            <ellipse cx="18" cy="5" rx="8" ry="5" fill="#1a3a8a" opacity="0.5"/>
                            
                            <!-- Boca (sonrisa) -->
                            <path d="M -10 10 Q 0 18 10 10" fill="none" stroke="#1a1a1a" stroke-width="2"/>
                            
                            <!-- Brazos -->
                            <ellipse cx="-30" cy="5" rx="8" ry="6" fill="#f5c842" transform="rotate(-20, -30, 5)"/>
                            <ellipse cx="30" cy="5" rx="8" ry="6" fill="#f5c842" transform="rotate(20, 30, 5)"/>
                            
                            <!-- Puños (pelota de fútbol) -->
                            <circle cx="-35" cy="10" r="5" fill="#1a1a1a"/>
                            <circle cx="35" cy="10" r="5" fill="#1a1a1a"/>
                            
                            <!-- Piernas -->
                            <ellipse cx="-10" cy="28" rx="8" ry="6" fill="#f5c842"/>
                            <ellipse cx="10" cy="28" rx="8" ry="6" fill="#f5c842"/>
                            
                            <!-- Zapatos (azules) -->
                            <ellipse cx="-12" cy="34" rx="10" ry="4" fill="#1a3a8a"/>
                            <ellipse cx="12" cy="34" rx="10" ry="4" fill="#1a3a8a"/>
                            
                            <!-- Cola con rayo -->
                            <path d="M 0 25 Q -20 35 -25 45 Q -20 48 -15 42" fill="none" stroke="#f5c842" stroke-width="4"/>
                            <polygon points="-25,45 -28,40 -20,40" fill="#f5c842"/>
                            
                            <!-- Número 6 en el pecho -->
                            <text x="0" y="8" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3a8a">6</text>
                        </g>
                        
                        <!-- Hinchada (puntos de colores en las tribunas) -->
                        <g opacity="0.8">
                            <circle cx="50" cy="80" r="3" fill="#f5c842"/>
                            <circle cx="70" cy="75" r="3" fill="#1a3a8a"/>
                            <circle cx="90" cy="85" r="3" fill="#f5c842"/>
                            <circle cx="110" cy="70" r="3" fill="#1a3a8a"/>
                            <circle cx="130" cy="78" r="3" fill="#f5c842"/>
                            <circle cx="150" cy="82" r="3" fill="#f5c842"/>
                            <circle cx="170" cy="65" r="3" fill="#1a3a8a"/>
                            <circle cx="190" cy="72" r="3" fill="#f5c842"/>
                            <circle cx="210" cy="80" r="3" fill="#1a3a8a"/>
                            <circle cx="230" cy="68" r="3" fill="#f5c842"/>
                            <circle cx="250" cy="75" r="3" fill="#1a3a8a"/>
                            <circle cx="270" cy="82" r="3" fill="#f5c842"/>
                            <circle cx="290" cy="70" r="3" fill="#1a3a8a"/>
                            <circle cx="310" cy="78" r="3" fill="#f5c842"/>
                            <circle cx="330" cy="65" r="3" fill="#1a3a8a"/>
                            <circle cx="350" cy="72" r="3" fill="#f5c842"/>
                            <circle cx="370" cy="80" r="3" fill="#1a3a8a"/>
                            <circle cx="390" cy="68" r="3" fill="#f5c842"/>
                            <circle cx="410" cy="75" r="3" fill="#1a3a8a"/>
                            <circle cx="430" cy="82" r="3" fill="#f5c842"/>
                            <circle cx="450" cy="70" r="3" fill="#1a3a8a"/>
                            <circle cx="470" cy="78" r="3" fill="#f5c842"/>
                            <circle cx="490" cy="85" r="3" fill="#1a3a8a"/>
                            <circle cx="510" cy="72" r="3" fill="#f5c842"/>
                            <circle cx="530" cy="80" r="3" fill="#1a3a8a"/>
                            <circle cx="550" cy="75" r="3" fill="#f5c842"/>
                        </g>
                        
                        <!-- Título -->
                        <text x="300" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#f5c842" opacity="0.8">
                            🏟️ LA BOMBONERA
                        </text>
                    </svg>
                    <div class="caption">🏟️ La Bombonera - Estadio Alberto J. Armando</div>
                </div>
                
                <!-- Imagen 2: Hinchada -->
                <div class="image-card">
                    <svg width="100%" height="250" viewBox="0 0 600 250" style="background: linear-gradient(135deg, #0a1a3a, #1a2a5a);">
                        <!-- Gradas -->
                        <rect x="0" y="0" width="600" height="250" fill="#1a2a5a"/>
                        
                        <!-- Filas de hinchas -->
                        <g>
                            <!-- Fila 1 -->
                            <circle cx="30" cy="30" r="8" fill="#f5c842"/>
                            <circle cx="55" cy="30" r="8" fill="#1a3a8a"/>
                            <circle cx="80" cy="30" r="8" fill="#f5c842"/>
                            <circle cx="105" cy="30" r="8" fill="#1a3a8a"/>
                            <circle cx="130" cy="30" r="8" fill="#f5c842"/>
                            <circle cx="155" cy="30" r="8" fill="#1a3a8a"/>
                            <circle cx="180" cy="30" r="8" fill="#f5c842"/>
                            <circle cx="205" cy="30" r="8" fill="#1a3a8a"/>
                            <circle cx="230" cy="30" r="8" fill="#f5c842"/>
                            <circle cx="255" cy="30" r="8" fill="#1a3a8a"/>
                            <circle cx="280" cy="30" r="8" fill="#f5c842"/>
                            <circle cx="305" cy="30" r="8" fill="#1a3a8a"/>
                            <circle cx="330" cy="30" r="8" fill="#f5c842"/>
